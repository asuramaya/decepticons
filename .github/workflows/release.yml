name: Release

# Builds an sdist + wheel on every tag matching `vX.Y.Z` and publishes to PyPI.
#
# Auth options (pick one):
#
#   1. Trusted publishing (recommended) — no token needed.
#      In PyPI: Account → Publishing → "Add a new pending publisher".
#        Project name : decepticons
#        Owner        : asuramaya
#        Repo         : decepticons
#        Workflow     : release.yml
#        Environment  : pypi
#      Then create a `pypi` environment in this repo's settings.
#      The job below uses OIDC via `id-token: write` and the official
#      `pypa/gh-action-pypi-publish` action, which auto-detects trusted publishing.
#
#   2. API token fallback — uncomment the `password:` line below and add
#      `PYPI_API_TOKEN` as a repository secret.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build distributions
        run: python -m build
      - name: Verify metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/decepticons
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
