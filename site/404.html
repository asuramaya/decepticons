<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 — decepticons</title>
<meta name="description" content="O(n) attention is deception. So is this URL." />
<link rel="icon" type="image/webp" href="/assets/logo.webp" />
<link rel="stylesheet" href="/styles.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  .lost {
    min-height: 70vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 24px;
  }
  .lost h1 {
    font-family: var(--mono);
    font-size: clamp(4rem, 14vw, 9rem);
    color: var(--green);
    margin: 0;
    letter-spacing: 0.04em;
  }
  .lost .sub {
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--yellow);
    font-size: 0.78rem;
    margin: 1.2rem 0 0.4rem;
  }
  .lost .lede {
    max-width: 50ch;
    color: var(--fg-dim);
  }
  .lost .cta { margin-top: 28px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>
<main class="lost">
  <h1>404</h1>
  <div class="sub">URL not in the kernel</div>
  <p class="lede">O(n) attention is deception. So is this URL — it didn't resolve to anything we ship.</p>
  <div class="cta">
    <a class="btn primary" href="/">Back to home</a>
    <a class="btn ghost" href="https://github.com/asuramaya/decepticons">Open the source</a>
  </div>
</main>
</body>
</html>
